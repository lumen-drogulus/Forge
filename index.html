<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FORGE">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <title>FORGE</title>
</head>
<body>
  <!-- Splash Screen -->
  <div class="splash" id="splash">
    <img src="logo1.png" alt="FORGE" class="splash-logo" id="splash-logo" onerror="this.style.display='none'">
  </div>

  <!-- PR Celebration Overlay -->
  <div class="pr-overlay" id="pr-overlay">
    <div class="forge-flash" id="pr-flash"></div>
    <img src="pr.png" alt="Personal Record" class="pr-overlay-img" id="pr-overlay-img">
    <div class="pr-overlay-text" id="pr-overlay-text">NEW PERSONAL RECORD</div>
  </div>

  <!-- App Shell -->
  <div id="app">
    <!-- Header -->
    <div class="header">
      <div class="header-brand">
        <img src="logo.png" alt="" onerror="this.style.display='none'">
        <span>FORGE</span>
      </div>
      <button class="header-btn" id="settings-btn">
        <i class="ti ti-settings"></i>
      </button>
    </div>

    <!-- Main Content Area -->
    <div class="main" id="main-content">
      <!-- Content injected by app.js -->
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav" id="bottom-nav">
      <button class="nav-item active" data-tab="home">
        <i class="ti ti-home nav-item-icon"></i>
        <div class="nav-item-label">Home</div>
      </button>
      <button class="nav-item" data-tab="tracker">
        <i class="ti ti-chart-bar nav-item-icon"></i>
        <div class="nav-item-label">Tracker</div>
      </button>
      <button class="nav-item" data-tab="prs">
        <i class="ti ti-trophy nav-item-icon"></i>
        <div class="nav-item-label">PRs</div>
      </button>
      <button class="nav-item" data-tab="settings">
        <i class="ti ti-settings nav-item-icon"></i>
        <div class="nav-item-label">Settings</div>
      </button>
    </div>
  </div>

  <!-- Info Panel (slides up for exercise tips/images) -->
  <div class="info-panel-backdrop" id="info-backdrop"></div>
  <div class="info-panel" id="info-panel">
    <div class="info-panel-handle"></div>
    <div id="info-panel-content"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
